                                                        <span className="text-[10px] text-slate-500 truncate">🎯 {entry.theme}</span>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}


                            {/* 设置 Tab */}
                            {activeSidebarTab === 'settings' && (
                                <div className="space-y-3">
                                    <div className={`rounded-xl p-3 border ${apiConnected ? 'bg-emerald-500/10 border-emerald-500/30' : 'bg-slate-800/50 border-slate-700/50'}`}><div className="flex items-center gap-2">{apiConnected ? <><div className="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center"><PlugZap className="w-4 h-4 text-emerald-400" /></div><div><div className="text-xs font-medium text-emerald-400">已连接</div><div className="text-[10px] text-emerald-400/70">{API_PROVIDERS[apiProvider]?.name}</div></div></> : <><div className="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center"><Plug className={`w-4 h-4 ${apiKeys[apiProvider] ? 'text-amber-400' : 'text-red-400'}`} /></div><div><div className={`text-xs font-medium ${apiKeys[apiProvider] ? 'text-amber-400' : 'text-red-400'}`}>{apiKeys[apiProvider] ? '未测试' : '未配置'}</div><div className="text-[10px] text-slate-500">请配置后测试</div></div></>}</div></div>
                                    <div className="space-y-3"><h3 className="text-xs font-bold text-slate-200 flex items-center gap-2 border-b border-slate-800 pb-2"><Server className="w-3.5 h-3.5" /> API 配置</h3><div><label className="block text-[10px] font-medium text-slate-400 mb-1 uppercase">服务商</label><select value={apiProvider} onChange={e => handleProviderChange(e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded-lg py-2 px-2.5 text-xs text-slate-200">{Object.values(API_PROVIDERS).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select></div><div><label className="block text-[10px] font-medium text-slate-400 mb-1 uppercase flex items-center gap-1"><Globe className="w-3 h-3" /> Base URL</label><input type="text" value={currentBaseUrl} onChange={e => handleBaseUrlChange(e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded-lg py-2 px-2.5 text-xs text-slate-200 font-mono" /></div><div><label className="block text-[10px] font-medium text-slate-400 mb-1 uppercase">API Key</label><div className="relative"><KeyRound className="absolute left-2.5 top-2 w-3.5 h-3.5 text-slate-500" /><input type="password" value={apiKeys[apiProvider] || ''} onChange={e => handleApiKeyChange(e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded-lg py-2 pl-8 pr-3 text-xs text-slate-200" placeholder="sk-..." /></div></div><div><label className="block text-[10px] font-medium text-slate-400 mb-1 uppercase flex items-center gap-1"><Cpu className="w-3 h-3" /> Model</label><div className="flex gap-1.5"><input type="text" value={currentModel} onChange={e => handleModelChange(e.target.value)} className="flex-1 bg-slate-950 border border-slate-700 rounded-lg py-2 px-2.5 text-xs text-slate-200 font-mono" /><button onClick={fetchModelList} disabled={isLoadingModels} className="px-2.5 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-slate-400 disabled:opacity-50">{isLoadingModels ? <Loader2 className="w-3.5 h-3.5 animate-spin" /> : <List className="w-3.5 h-3.5" />}</button></div>{availableModels.length > 0 && <div className="mt-1.5 max-h-40 overflow-y-auto custom-scrollbar bg-slate-950 border border-slate-700 rounded-lg">{availableModels.map(m => <button key={m} onClick={() => handleModelChange(m)} className={`w-full text-left px-2.5 py-1 text-[10px] font-mono hover:bg-slate-800 ${currentModel === m ? 'text-pink-400 bg-pink-500/10' : 'text-slate-400'}`}>{m}</button>)}</div>}</div><div className="grid grid-cols-2 gap-2"><div><label className="block text-[10px] font-medium text-slate-400 mb-1 uppercase">超时 (秒)</label><input type="number" min="5" max="300" value={apiTimeout / 1000} onChange={e => setApiTimeout(Number(e.target.value) * 1000)} className="w-full bg-slate-950 border border-slate-700 rounded-lg py-2 px-2.5 text-xs text-slate-200" /></div><div><label className="block text-[10px] font-medium text-slate-400 mb-1 uppercase">最大重试</label><input type="number" min="0" max="10" value={apiRetries} onChange={e => setApiRetries(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-700 rounded-lg py-2 px-2.5 text-xs text-slate-200" /></div></div><button onClick={testApiConnection} disabled={isTestingConnection || !apiKeys[apiProvider]} className={`w-full flex items-center justify-center gap-1.5 py-2 rounded-lg font-medium text-xs disabled:opacity-50 ${apiConnected ? 'bg-emerald-600 hover:bg-emerald-500 text-white' : 'bg-slate-700 hover:bg-slate-600 text-slate-200'}`}>{isTestingConnection ? <><Loader2 className="w-3.5 h-3.5 animate-spin" /> 测试中...</> : <><TestTube className="w-3.5 h-3.5" /> 测试连接</>}</button>{apiError && <div className="p-2 bg-red-500/10 border border-red-500/30 rounded-lg"><div className="flex items-start gap-1.5"><XCircle className="w-3.5 h-3.5 text-red-400 mt-0.5 flex-shrink-0" /><p className="text-[10px] text-red-400 break-all">{apiError}</p></div></div>}</div>
                                    <div className="space-y-3"><h3 className="text-xs font-bold text-slate-200 flex items-center gap-2 border-b border-slate-800 pb-2"><Shield className="w-3.5 h-3.5" /> 提示词后处理</h3><div className="flex items-center justify-between px-1 py-1.5 bg-slate-800/30 rounded-lg border border-slate-700/30"><div className="flex items-center gap-2"><Shield className={`w-3.5 h-3.5 ${strictMode ? 'text-amber-400' : 'text-slate-500'}`} /><span className={`text-[10px] font-medium ${strictMode ? 'text-amber-300' : 'text-slate-400'}`}>严格模式</span></div><div className="flex items-center gap-1.5">{strictMode && (<button onClick={() => { const newPlaceholder = prompt('自定义占位消息:', strictPlaceholder); if (newPlaceholder !== null) setStrictPlaceholder(newPlaceholder); }} className="p-1 bg-slate-700 text-slate-400 hover:text-amber-400 rounded" title={`占位符: ${strictPlaceholder}`}><Edit3 className="w-3 h-3" /></button>)}<button onClick={() => setStrictMode(!strictMode)} className={`relative w-9 h-[18px] rounded-full transition-colors ${strictMode ? 'bg-amber-500' : 'bg-slate-700'}`}><div className={`absolute top-[2px] w-[14px] h-[14px] bg-white rounded-full transition-all ${strictMode ? 'left-[18px]' : 'left-[2px]'}`} /></button></div></div></div>
                                    <div className="space-y-3"><h3 className="text-xs font-bold text-slate-200 flex items-center gap-2 border-b border-slate-800 pb-2"><Settings2 className="w-3.5 h-3.5" /> 模型参数</h3><div><div className="flex items-center justify-between mb-1"><label className="text-[10px] font-medium text-slate-400">温度</label><span className="text-[10px] text-pink-400 font-mono">{temperature}</span></div><input type="range" min="0" max="2" step="0.05" value={temperature} onChange={e => setTemperature(parseFloat(e.target.value))} className="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-pink-500" /></div><div><div className="flex items-center justify-between mb-1"><label className="text-[10px] font-medium text-slate-400" title="频率惩罚，减少重复词汇的出现">频率惩罚</label><span className="text-[10px] text-cyan-400 font-mono">{frequencyPenalty}</span></div><input type="range" min="-2" max="2" step="0.05" value={frequencyPenalty} onChange={e => setFrequencyPenalty(parseFloat(e.target.value))} className="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-cyan-500" /></div><div><div className="flex items-center justify-between mb-1"><label className="text-[10px] font-medium text-slate-400" title="存在惩罚，鼓励讨论新话题">存在惩罚</label><span className="text-[10px] text-amber-400 font-mono">{presencePenalty}</span></div><input type="range" min="-2" max="2" step="0.05" value={presencePenalty} onChange={e => setPresencePenalty(parseFloat(e.target.value))} className="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-amber-500" /></div><div><div className="flex items-center justify-between mb-1"><label className="text-[10px] font-medium text-slate-400">Top P</label><span className="text-[10px] text-purple-400 font-mono">{topP}</span></div><input type="range" min="0" max="1" step="0.05" value={topP} onChange={e => setTopP(parseFloat(e.target.value))} className="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-purple-500" /></div><div className="flex gap-1.5"><button onClick={() => { setTemperature(1); setFrequencyPenalty(0); setPresencePenalty(0); setTopP(1); }} className="flex-1 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-[10px]">🔄 默认</button><button onClick={() => { setTemperature(1); setFrequencyPenalty(0); setPresencePenalty(0); setTopP(0.9); }} className="flex-1 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-[10px]">🎯 精确</button><button onClick={() => { setTemperature(1.3); setFrequencyPenalty(0.3); setPresencePenalty(0.3); setTopP(0.95); }} className="flex-1 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-[10px]">🎲 创意</button></div></div>
                                    <div className="bg-gradient-to-r from-indigo-500/20 to-purple-500/20 border border-indigo-500/30 rounded-xl p-3 text-center space-y-2"><div><div className="text-[10px] text-indigo-300 font-medium">原项目</div><div className="text-sm font-bold text-white">逐辰十七</div></div><div className="border-t border-indigo-500/20 pt-2"><div className="text-[10px] text-pink-300 font-medium">二改版</div><div className="text-sm font-bold text-white">渊//愿</div></div></div>
                                    <a href="https://legend-patella-fdc.notion.site/2f8a533ab7a880ab8fa0df1e5bb051a6" target="_blank" rel="noopener noreferrer" className="block bg-gradient-to-r from-green-500/20 to-emerald-500/20 border border-green-500/30 rounded-xl p-3 text-center hover:from-green-500/30 hover:to-emerald-500/30"><div className="text-[10px] text-green-300 font-medium">免费教程</div><div className="text-sm font-bold text-white">教你如何白嫖API 🎁</div></a>
                                </div>
                            )}
                        </div>
                    </div>



                    {/* Header */}
                    <header className="bg-slate-900/90 backdrop-blur-md border-b border-slate-800 sticky top-0 z-20 px-4 py-3 shadow-lg" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-3" style={{ marginLeft: isMobile ? 0 : (ocPanelOpen ? '288px' : '48px'), transition: 'margin-left 0.3s' }}>
                                <button onClick={() => setOcPanelOpen(!ocPanelOpen)} className={`p-2 rounded-lg md:hidden ${ocEnabled && currentCharacters.filter(oc => oc.enabled).length > 0 ? 'bg-pink-500/20 text-pink-400 border border-pink-500/30' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}><User className="w-5 h-5" /></button>
                                <div className={`p-2 rounded-lg shadow-lg ${isNewbieMode ? 'bg-gradient-to-tr from-purple-500 to-blue-600' : 'bg-gradient-to-tr from-pink-500 to-violet-600'}`}>{isNewbieMode ? <Code className="w-5 h-5 text-white" /> : <Sparkles className="w-5 h-5 text-white animate-pulse" />}</div>
                                <div className="relative">
                                    <button onClick={() => setShowModeDropdown(!showModeDropdown)} className="flex items-center gap-2 text-lg md:text-xl font-bold text-slate-200 hover:text-white">
                                        <span>{PROMPT_MODES[promptMode]?.name || 'SD 抽卡'}</span>
                                        {promptMode === 'nai' && naiMultiMode && <span className="text-[10px] bg-amber-500/20 text-amber-400 px-1.5 py-0.5 rounded-full border border-amber-500/30">分角色</span>}
                                        <ChevronDown className={`w-4 h-4 text-slate-400 transition-transform ${showModeDropdown ? 'rotate-180' : ''}`} />
                                    </button>
                                    <span className="text-slate-500 text-sm font-normal ml-1 hidden md:inline">{PROMPT_MODES[promptMode]?.fullName}</span>
                                    {showModeDropdown && (
                                        <div className="absolute top-full left-0 mt-2 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl z-50 overflow-hidden min-w-[220px]">
                                            {Object.values(PROMPT_MODES).map(mode => {
                                                const ModeIcon = mode.icon;
                                                const isActive = promptMode === mode.id;
                                                return (
                                                    <div key={mode.id}>
                                                        <button onClick={() => switchPromptMode(mode.id)} className={`w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-slate-700 ${isActive ? 'bg-blue-500/20 text-blue-400' : 'text-slate-300'}`}>
                                                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${isActive ? 'bg-blue-500' : 'bg-slate-700'}`}><ModeIcon className="w-4 h-4 text-white" /></div>
                                                            <div><div className="font-medium">{mode.name}</div><div className="text-[10px] text-slate-500">{mode.fullName}</div></div>
                                                            {isActive && <CheckCircle2 className="w-4 h-4 ml-auto text-blue-400" />}
                                                        </button>
                                                        {mode.id === 'nai' && isActive && (
                                                            <div className="px-4 py-2 bg-slate-900/50 border-t border-slate-700/50">
                                                                <button onClick={e => { e.stopPropagation(); setNaiMultiMode(!naiMultiMode); showToast(naiMultiMode ? "已切换到单人模式" : "已切换到分角色模式", "success"); }} className={`w-full flex items-center justify-between px-3 py-2 rounded-lg ${naiMultiMode ? 'bg-amber-500/20 border border-amber-500/30' : 'bg-slate-800 border border-slate-700'}`}>
                                                                    <div className="flex items-center gap-2"><Users className={`w-4 h-4 ${naiMultiMode ? 'text-amber-400' : 'text-slate-500'}`} /><span className={`text-xs font-medium ${naiMultiMode ? 'text-amber-300' : 'text-slate-400'}`}>分角色模式</span></div>
                                                                    <div className={`relative w-8 h-4 rounded-full ${naiMultiMode ? 'bg-amber-500' : 'bg-slate-600'}`}><div className={`absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all ${naiMultiMode ? 'left-4' : 'left-0.5'}`} /></div>
                                                                </button>
                                                                <p className="text-[9px] text-slate-600 mt-1 px-1">{naiMultiMode ? '使用 | 分隔多角色' : '传统9宫格布局'}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="fixed top-3 flex items-center gap-3 z-30" style={{ right: isMobile ? '16px' : '440px' }}>
                                <button onClick={copyAllPrompts} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium text-sm border ${showCopyFeedback ? "bg-emerald-500/10 text-emerald-400 border-emerald-500/30" : "bg-slate-800 text-slate-300 hover:text-white hover:bg-slate-700 border-slate-700/50"}`}>{showCopyFeedback ? <CheckSquare className="w-4 h-4" /> : <Copy className="w-4 h-4" />}<span>{showCopyFeedback ? "已复制" : isNewbieMode ? "复制 XML" : isNaiMultiMode ? "复制咒语" : "复制咒语"}</span></button>
                                <button onClick={() => { setIsSidebarOpen(!isSidebarOpen); if (!isSidebarOpen) setActiveSidebarTab('generate'); }} className={`p-2 rounded-lg border ${isSidebarOpen ? "bg-slate-700 text-white border-slate-600" : "bg-transparent text-slate-400 hover:text-white hover:bg-slate-800 border-transparent"}`}><Menu className="w-5 h-5" /></button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="p-4 md:p-6 transition-all" onClick={e => e.stopPropagation()}>
                        <div className="max-w-6xl mx-auto">
                            {!apiKeys[apiProvider] && <div onClick={() => { setIsSidebarOpen(true); setActiveSidebarTab('settings'); }} className="mb-6 text-center cursor-pointer group"><div className="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-pink-500/10 text-pink-300 text-sm font-medium border border-pink-500/20 group-hover:bg-pink-500/20"><Settings2 className="w-4 h-4 animate-bounce" /><span>请点击此处配置 API Key</span></div></div>}
                            {apiError && <div className="max-w-2xl mx-auto mb-6 bg-red-500/10 border border-red-500/50 text-red-200 px-4 py-3 rounded-lg text-center text-sm flex items-center justify-center gap-2"><AlertTriangle className="w-4 h-4" />{apiError}</div>}

                            {/* SD/NAI 9宫格 */}
                            {!isNewbieMode && !isNaiMultiMode && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                    {SLOT_CONFIG_STANDARD.map(config => {
                                        const slot = slots[config.id];
                                        if (!slot) return null;
                                        const SlotIcon = config.icon;
                                        return (
                                            <div key={config.id} className={`group flex flex-col rounded-xl border transition-all duration-300 overflow-hidden ${slot.locked ? "bg-slate-900 border-pink-500/40" : "bg-slate-900 border-slate-800 hover:border-slate-600"} ${!slot.included ? "opacity-60 grayscale-[0.5]" : ""}`}>
                                                <div onClick={() => setExpandedSlotId(config.id)} className="flex justify-between items-center px-4 py-3 bg-slate-900/50 border-b border-slate-800/50 cursor-pointer hover:bg-slate-800/80">
                                                    <div className="flex items-center gap-2 text-xs font-bold tracking-wider text-slate-400 uppercase"><SlotIcon className="w-3.5 h-3.5" />{config.label}</div>
                                                    <div className="flex items-center gap-1" onClick={e => e.stopPropagation()}>
                                                        <button onClick={() => setExpandedSlotId(config.id)} className="p-1.5 rounded text-slate-600 hover:text-white hover:bg-slate-800"><Maximize2 className="w-4 h-4" /></button>
                                                        <div className="w-px h-4 bg-slate-700 mx-1"></div>
                                                        <button onClick={() => copySlotContent(config.id)} className={`p-1.5 rounded ${slotCopyFeedback?.id === config.id ? "text-emerald-400 bg-emerald-400/10" : "text-slate-600 hover:text-emerald-400"}`}>{slotCopyFeedback?.id === config.id ? <CheckSquare className="w-4 h-4" /> : <Copy className="w-4 h-4" />}</button>
                                                        <button onClick={() => clearSlotTags(config.id)} className={`p-1.5 rounded ${slot.locked ? "text-slate-700 cursor-not-allowed" : "text-slate-600 hover:text-red-400"}`} disabled={slot.locked}><Trash2 className="w-4 h-4" /></button>
                                                        <div className="w-px h-4 bg-slate-700 mx-1"></div>
                                                        <button onClick={() => toggleInclude(config.id)} className={`p-1.5 rounded ${slot.included ? "text-emerald-400" : "text-slate-600"}`}>{slot.included ? <CheckSquare className="w-4 h-4" /> : <Square className="w-4 h-4" />}</button>
                                                        <button onClick={() => toggleLock(config.id)} className={`p-1.5 rounded ${slot.locked ? "text-pink-400 bg-pink-400/10" : "text-slate-600 hover:text-slate-300"}`}>{slot.locked ? <Lock className="w-4 h-4" /> : <Unlock className="w-4 h-4" />}</button>
                                                    </div>
                                                </div>
                                                <div className="relative flex-grow flex flex-col h-[240px]">
                                                    <div className={`flex-1 p-3 overflow-y-auto custom-scrollbar bg-slate-900/50 cursor-text ${dragData?.slotId === config.id ? 'bg-slate-800/30' : ''}`} ref={el => { if (!scrollRefs.current[config.id]) scrollRefs.current[config.id] = {}; scrollRefs.current[config.id].en = el; }} onScroll={() => handleSyncScroll(config.id, 'en')} onDragOver={handleDragOverContainer} onDrop={handleDrop} onClick={e => handleContainerClick(config.id, e)}>
                                                        <div className="flex flex-wrap gap-1.5 pointer-events-none">
                                                            {slot.tags.map((tag, index) => {
                                                                const isSelected = selectedTagIds.has(tag.id);
                                                                return (
                                                                    <React.Fragment key={tag.id}>

                                        <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
                                            <div className="flex-1 flex flex-col border-r border-slate-800 min-w-0">
                                                <div className="p-2 bg-slate-900/50 border-b border-slate-800 text-xs font-bold text-slate-500 uppercase flex justify-between"><span>Tags</span><span className="bg-slate-800 px-1.5 rounded">{slots[expandedSlotId].tags.length}</span></div>
                                                <div className="flex-1 overflow-y-auto custom-scrollbar p-3 bg-slate-900/30" onClick={e => handleContainerClick(expandedSlotId, e)}>
                                                    <div className="flex flex-wrap gap-1.5">
                                                        {slots[expandedSlotId].tags.map((tag, index) => {
                                                            const isSelected = selectedTagIds.has(tag.id);
                                                            return (
                                                                <React.Fragment key={tag.id}>
                                                                    {dropTarget?.slotId === expandedSlotId && dropTarget?.index === index && <div className="w-1 h-7 bg-pink-500 rounded-full animate-pulse" />}
                                                                    <div draggable onDragStart={e => handleDragStart(e, expandedSlotId, index)} onDragOver={e => handleDragOverTag(e, expandedSlotId, index)} onDrop={handleDrop} onClick={e => handleTagClick(tag.id, e)} onDoubleClick={e => handleTagDoubleClick(tag.id, e)} onMouseEnter={() => setHoveredTagId(tag.id)} onMouseLeave={() => setHoveredTagId(null)} className={`group/tag flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-mono border transition-all cursor-pointer select-none ${editingTagId === tag.id ? "bg-slate-950 border-violet-500 ring-2 ring-violet-500/50" : isSelected ? "bg-indigo-600 border-indigo-400 text-white shadow-lg scale-105" : hoveredTagId === tag.id ? "bg-yellow-500/20 border-yellow-500/50 text-yellow-100" : "bg-slate-800/50 border-slate-700 text-slate-300"}`}>
                                                                        <GripVertical className={`w-3 h-3 opacity-30 group-hover/tag:opacity-100 cursor-grab ${isSelected ? 'text-indigo-300' : 'text-slate-500'}`} />
                                                                        {editingTagId === tag.id ? <input ref={editInputRef} autoFocus type="text" value={tag.en} onChange={e => updateTagText(expandedSlotId, tag.id, e.target.value)} onBlur={e => finishEditing(expandedSlotId, tag.id, e.target.value)} onKeyDown={e => { if (e.key === 'Enter') finishEditing(expandedSlotId, tag.id, e.currentTarget.value); }} onClick={e => e.stopPropagation()} className="bg-transparent text-white border-none p-0 min-w-[60px] outline-none" /> : <span>{tag.en}</span>}
                                                                        <button onClick={e => { e.stopPropagation(); removeTag(expandedSlotId, tag.id); }} className={`ml-1 opacity-0 group-hover/tag:opacity-100 hover:text-red-400 ${isSelected ? "text-indigo-200" : "text-slate-500"}`}><X className="w-3 h-3" /></button>
                                                                    </div>
                                                                </React.Fragment>
                                                            );
                                                        })}
                                                        {dropTarget?.slotId === expandedSlotId && dropTarget?.index === slots[expandedSlotId].tags.length && <div className="w-1 h-7 bg-pink-500 rounded-full animate-pulse" />}
                                                        <div className="relative flex items-center min-w-[80px] max-w-[150px]"><Plus className="w-3.5 h-3.5 text-slate-600 absolute left-2" /><input ref={el => slotInputRefs.current[expandedSlotId] = el} type="text" placeholder="Add..." className="w-full bg-slate-800/30 border border-transparent hover:border-slate-700 focus:border-indigo-500 rounded-lg py-1.5 pl-7 text-xs text-slate-200" onKeyDown={e => { if (e.key === 'Enter') { addTag(expandedSlotId, e.target.value); e.target.value = ''; } }} onBlur={e => { if (e.target.value) { addTag(expandedSlotId, e.target.value); e.target.value = ''; } }} /></div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex-1 flex flex-col min-w-0 bg-slate-950/30">
                                                <div className="p-2 bg-slate-900/50 border-b border-slate-800 text-xs font-bold text-slate-500 uppercase">翻译 & 权重</div>
                                                <div className="flex-1 overflow-y-auto custom-scrollbar p-3">
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
                                                        {slots[expandedSlotId].tags.map(tag => {
                                                            const isSelected = selectedTagIds.has(tag.id);
                                                            return (
                                                                <div key={tag.id + '_zh_exp'} onClick={e => handleTagClick(tag.id, e)} onMouseEnter={() => setHoveredTagId(tag.id)} onMouseLeave={() => setHoveredTagId(null)} className={`group flex items-center gap-2 p-2 rounded-lg border transition-all cursor-pointer ${isSelected ? "bg-indigo-900/30 border-indigo-500/50" : hoveredTagId === tag.id ? "bg-yellow-500/20 border-yellow-500/50" : "bg-slate-900/50 border-slate-800 hover:border-slate-700"}`}>
                                                                    <div className="flex-1 flex flex-col min-w-0"><span className={`text-[10px] font-mono truncate ${hoveredTagId === tag.id ? "text-yellow-200/70" : "text-slate-500"}`}>{tag.en}</span><span className={`text-xs font-medium truncate ${tag.zh === '?' ? "text-slate-600" : hoveredTagId === tag.id ? "text-yellow-100" : "text-slate-300"}`}>{tag.zh === '?' ? "未翻译" : tag.zh}</span></div>
                                                                    <button onClick={e => { e.stopPropagation(); removeTag(expandedSlotId, tag.id); }} className="opacity-0 group-hover:opacity-100 p-1 hover:bg-slate-800 hover:text-red-400 rounded text-slate-500 flex-shrink-0"><X className="w-3.5 h-3.5" /></button>
                                                                    <div className="flex items-center gap-0.5 bg-slate-950 rounded border border-slate-800 p-0.5 flex-shrink-0"><button onClick={e => { e.stopPropagation(); adjustTagWeight(expandedSlotId, tag.id, -0.1); }} className="p-1 hover:bg-slate-800 hover:text-red-400 rounded text-slate-500"><Minus className="w-3 h-3" /></button><div className="w-px h-3 bg-slate-800"></div><button onClick={e => { e.stopPropagation(); adjustTagWeight(expandedSlotId, tag.id, 0.1); }} className="p-1 hover:bg-slate-800 hover:text-emerald-400 rounded text-slate-500"><Plus className="w-3 h-3" /></button></div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* 底部按钮 */}
                    <div className="fixed bottom-6 left-0 right-0 z-30 px-4 pointer-events-none" onClick={e => e.stopPropagation()}>
                        <div className="max-w-2xl mx-auto pointer-events-auto">
                            <div className={`flex gap-3 ${keepMemory && (lastTheme || conversationHistory.length > 0) ? '' : 'justify-center'}`}>
                                {keepMemory && (lastTheme || conversationHistory.length > 0) && (
                                    <button onClick={handleRegenerate} disabled={isRolling} className={`flex-1 group relative overflow-hidden rounded-2xl p-4 transition-all duration-200 shadow-2xl ${isRolling ? "scale-95 opacity-80" : "hover:scale-[1.02]"}`}>
                                        <div className={`absolute inset-0 opacity-90 group-hover:opacity-100 animate-gradient-x ${isNewbieMode ? 'bg-gradient-to-r from-purple-600 via-blue-600 to-indigo-500' : 'bg-gradient-to-r from-violet-600 via-pink-600 to-orange-500'}`}></div>
                                        <div className="relative flex items-center justify-center gap-2 text-white font-bold text-sm md:text-lg uppercase">{isRolling ? <Loader2 className="w-5 h-5 animate-spin" /> : <RotateCw className="w-5 h-5" />}<span className="hidden sm:inline">重新生成</span><span className="sm:hidden">重抽</span></div>
                                    </button>
                                )}
                                <button onClick={handleBottomButtonClick} disabled={isRolling} className={`group relative overflow-hidden rounded-2xl p-4 transition-all duration-200 shadow-2xl ${keepMemory && (lastTheme || conversationHistory.length > 0) ? 'flex-1' : 'w-full max-w-md'} ${isRolling ? "scale-95 opacity-80" : "hover:scale-[1.02]"}`}>
                                    <div className={`absolute inset-0 animate-gradient-x ${!apiKeys[apiProvider] ? 'bg-slate-800' : isNewbieMode ? 'bg-gradient-to-r from-purple-600 via-blue-600 to-indigo-500' : 'bg-gradient-to-r from-violet-600 via-pink-600 to-orange-500'}`}></div>
                                    <div className="relative flex items-center justify-center gap-3 text-white font-bold text-sm md:text-lg uppercase">{isRolling ? <><RefreshCw className="w-5 h-5 animate-spin" /><span>{loadingText}</span></> : <>{isNewbieMode ? <Code className="w-5 h-5" /> : <Sparkles className="w-5 h-5 animate-pulse" />}<span>{!apiKeys[apiProvider] ? "设置 API Key" : "一键抽卡"}</span></>}</div>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<StableDiffusionGacha />);
    </script>
</body>
</html>
